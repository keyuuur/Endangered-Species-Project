<script>
  var STORAGE_KEY = 'esrm_v13_draft';

  var state = {
    config: null,
    studentKey: '',
    selectedSpecies: null,
    currentStage: 'login',
    generatingPoster: false,
    submitMode: '',
    selectedImageUrl: '',
    selectedImageIndex: -1,
    lastSavedAt: ''
  };

  var savedAnswers = {};
  var imagePreviewCache = {};
  var activePosterImageLoadState = null;

  var stageOrder = ['login', 'species', 'briefing', 'ecology', 'threats', 'actions', 'final', 'submitted'];
  var sidebarStages = ['species', 'briefing', 'ecology', 'threats', 'actions', 'final', 'submitted'];
  var stageChrome = {
    login: { progressTitle: 'Mission Intake', progressCopy: 'Awaiting mission start', commandLabel: 'Mission Intake' },
    species: { progressTitle: 'Mission Progress', progressCopy: 'Choose a target species', commandLabel: 'Species Selection' },
    briefing: { progressTitle: 'Mission Progress', progressCopy: 'Briefing loaded and ready', commandLabel: 'Mission Briefing' },
    ecology: { progressTitle: 'Mission Progress', progressCopy: 'Gathering ecological evidence', commandLabel: 'Ecology Report' },
    threats: { progressTitle: 'Mission Progress', progressCopy: 'Documenting major threats', commandLabel: 'Threat Analysis' },
    actions: { progressTitle: 'Mission Progress', progressCopy: 'Planning conservation actions', commandLabel: 'Action Planning' },
    final: { progressTitle: 'Mission Progress', progressCopy: 'Poster nearly complete', commandLabel: 'Final Pitch' },
    submitted: { progressTitle: 'Mission Progress', progressCopy: 'Mission complete', commandLabel: 'Mission Complete' }
  };

  document.addEventListener('DOMContentLoaded', function () {
    wireButtons();
    wireDraftInputs();
    loadInitialConfig();
  });

  function wireButtons() {
    document.getElementById('startMissionBtn').addEventListener('click', handleStartMission);
    document.getElementById('briefingContinueBtn').addEventListener('click', function () {
      saveAnswersForStage('briefing');
      showStage('ecology');
    });
    document.getElementById('saveEcologyBtn').addEventListener('click', handleSaveEcology);
    document.getElementById('saveThreatsBtn').addEventListener('click', handleSaveThreats);
    document.getElementById('saveActionsBtn').addEventListener('click', handleSaveActions);
    document.getElementById('finishMissionBtn').addEventListener('click', handleFinishMission);
    document.getElementById('emergencySubmitBtn').addEventListener('click', function () {
      openSubmitModal('emergency');
    });
    document.getElementById('submitModalCancelBtn').addEventListener('click', closeSubmitModal);
    document.getElementById('submitModalConfirmBtn').addEventListener('click', confirmModalSubmit);
  }

  function wireDraftInputs() {
    var ids = [
      'firstName', 'lastName',
      'commonNameAnswer', 'scientificNameAnswer', 'statusAnswer',
      'habitatType', 'dietType', 'adaptationType', 'ecosystemRole', 'ecologyExplanation',
      'threat1', 'threat1Reason', 'threat2', 'threat2Reason',
      'action1', 'action2', 'actionExplanation',
      'whyItMatters'
    ];
    for (var i = 0; i < ids.length; i++) {
      var el = document.getElementById(ids[i]);
      if (!el) continue;
      el.addEventListener('input', persistDraftState);
      el.addEventListener('change', persistDraftState);
    }
  }

  function refreshDashboardChrome() {
    updateMissionIdentity();
    updateSidebarStageStates();
    updateChecklistStates();
    updateFinalSummaryCards();
    updateCommandStageLabel();
    updateSavedTimestamp(state.lastSavedAt);
  }

  function updateMissionIdentity() {
    var firstName = getValue('firstName').trim();
    var lastName = getValue('lastName').trim();
    var initials = ((firstName.charAt(0) || '') + (lastName.charAt(0) || '')).toUpperCase();
    var badge = document.getElementById('studentBadge');
    var label = document.getElementById('studentClassLabel');
    if (badge) badge.textContent = initials || 'HQ';
    if (label) {
      label.textContent = firstName || lastName ? [firstName, lastName].join(' ').trim() : 'Conservation Team';
    }
  }

  function updateSidebarStageStates() {
    var currentIndex = stageOrder.indexOf(state.currentStage);
    for (var i = 0; i < sidebarStages.length; i++) {
      var stageName = sidebarStages[i];
      var stageEl = document.getElementById('sidebarStage-' + stageName);
      var statusEl = document.getElementById('sidebarStageStatus-' + stageName);
      var numberEl = document.getElementById('sidebarStageNumber-' + stageName);
      if (!stageEl || !statusEl || !numberEl) continue;

      var stageIndex = stageOrder.indexOf(stageName);
      var isActive = state.currentStage === stageName;
      var isComplete = state.currentStage !== 'login' && currentIndex > stageIndex;

      stageEl.classList.toggle('active', isActive);
      stageEl.classList.toggle('complete', isComplete);
      statusEl.textContent = isComplete ? 'OK' : (isActive ? 'NOW' : '');
      numberEl.textContent = isComplete ? 'OK' : String(i + 1);
    }
  }

  function setChecklistState(id, isComplete) {
    var item = document.getElementById(id);
    if (!item) return;
    item.classList.toggle('complete', !!isComplete);
  }

  function updateChecklistStates() {
    var hasSpecies = !!(state.selectedSpecies && state.selectedSpecies.species_id);
    var ecologyComplete = areFilled([
      getValue('commonNameAnswer'),
      getValue('scientificNameAnswer'),
      getValue('statusAnswer'),
      getValue('habitatType'),
      getValue('dietType'),
      getValue('adaptationType'),
      getValue('ecosystemRole'),
      getValue('ecologyExplanation')
    ]);
    var threatsComplete = areFilled([
      getValue('threat1'),
      getValue('threat1Reason'),
      getValue('threat2'),
      getValue('threat2Reason')
    ]) && uniqueLowerCount([getValue('threat1'), getValue('threat2')]) === 2;
    var actionsComplete = areFilled([
      getValue('action1'),
      getValue('action2'),
      getValue('actionExplanation')
    ]) && uniqueLowerCount([getValue('action1'), getValue('action2')]) === 2;
    var pitchComplete = !!getValue('whyItMatters').trim();
    var imageSelected = !!state.selectedImageUrl;
    var ready = hasSpecies && ecologyComplete && threatsComplete && actionsComplete && pitchComplete && imageSelected;

    setChecklistState('checkSpecies', hasSpecies);
    setChecklistState('checkEcology', ecologyComplete);
    setChecklistState('checkThreats', threatsComplete);
    setChecklistState('checkActions', actionsComplete);
    setChecklistState('checkPitch', pitchComplete);
    setChecklistState('checkImage', imageSelected);
    setChecklistState('checkReady', ready || state.currentStage === 'submitted');
  }

  function updateSavedTimestamp(savedAt) {
    var el = document.getElementById('saveTimestamp');
    if (!el) return;
    if (!savedAt) {
      el.textContent = 'Last saved: Not yet';
      return;
    }

    var date = savedAt instanceof Date ? savedAt : new Date(savedAt);
    if (isNaN(date.getTime())) {
      el.textContent = 'Last saved: Recently';
      return;
    }

    el.textContent = 'Last saved: ' + date.toLocaleString([], {
      month: 'short',
      day: 'numeric',
      hour: 'numeric',
      minute: '2-digit'
    });
  }

  function updateCommandStageLabel() {
    var label = document.getElementById('commandStageLabel');
    if (!label) return;
    label.textContent = stageChrome[state.currentStage] ? stageChrome[state.currentStage].commandLabel : 'Mission Control';
  }

  function updateFinalSummaryCards() {
    setText('finalThreat1Title', getValue('threat1') || 'Threat 1');
    setText('finalThreat1Text', getValue('threat1Reason') || 'Choose and explain the first major threat.');
    setText('finalThreat2Title', getValue('threat2') || 'Threat 2');
    setText('finalThreat2Text', getValue('threat2Reason') || 'Choose and explain the second major threat.');

    setText('finalAction1Title', getValue('action1') || 'Action 1');
    setText('finalAction1Text', getValue('actionExplanation') || 'Choose the first conservation action.');
    setText('finalAction2Title', getValue('action2') || 'Action 2');
    setText('finalAction2Text', getValue('actionExplanation') || 'Choose the second conservation action.');

    setText('finalThreatCount', filledCount([getValue('threat1'), getValue('threat2')]) + ' identified');
    setText('finalActionCount', filledCount([getValue('action1'), getValue('action2')]) + ' planned');
  }

  function setText(id, text) {
    var el = document.getElementById(id);
    if (el) el.textContent = text || '';
  }

  /* ===== Back navigation ===== */

  function saveAnswersForStage(stage) {
    savedAnswers[stage] = collectFieldValues();
  }

  function restoreAnswersForStage(stage) {
    if (savedAnswers[stage]) {
      applyFieldValues(savedAnswers[stage]);
    }
  }

  function goBack(targetStage) {
    clearStatus();
    saveAnswersForStage(state.currentStage);
    showStage(targetStage);
    restoreAnswersForStage(targetStage);
  }

  /* ===== Image chooser ===== */

  function getSpeciesImageUrls(species) {
    return [
      species && species.image_option_1_url ? species.image_option_1_url : '',
      species && species.image_option_2_url ? species.image_option_2_url : '',
      species && species.image_option_3_url ? species.image_option_3_url : ''
    ];
  }

  function normalizeClientImageUrl(url) {
    var text = String(url || '').trim();
    if (!text) return '';
    if (/^data:image\//i.test(text)) return text;

    var driveMatch = text.match(/[?&]id=([a-zA-Z0-9_-]{10,})/i) || text.match(/\/d\/([a-zA-Z0-9_-]{10,})/i);
    if (driveMatch && driveMatch[1]) {
      return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(driveMatch[1]) + '&sz=w1600';
    }

    if (/dropbox\.com/i.test(text)) {
      if (/[?&]raw=1\b/i.test(text)) return text;
      if (/[?&]dl=0\b/i.test(text)) return text.replace(/([?&])dl=0\b/i, '$1raw=1');
      return text + (text.indexOf('?') === -1 ? '?raw=1' : '&raw=1');
    }

    return text;
  }

  function requestServerImagePreview(rawUrl, callback) {
    var cacheKey = String(rawUrl || '').trim();
    if (!cacheKey) {
      callback('');
      return;
    }
    if (Object.prototype.hasOwnProperty.call(imagePreviewCache, cacheKey)) {
      callback(imagePreviewCache[cacheKey]);
      return;
    }

    google.script.run
      .withSuccessHandler(function (previewUrl) {
        imagePreviewCache[cacheKey] = previewUrl || '';
        callback(imagePreviewCache[cacheKey]);
      })
      .withFailureHandler(function () {
        imagePreviewCache[cacheKey] = '';
        callback('');
      })
      .getEmbeddableImagePreview(cacheKey);
  }

  function loadImageElement(img, rawUrl, options) {
    options = options || {};
    var cleanedUrl = String(rawUrl || '').trim();
    if (!cleanedUrl) {
      if (options.onFail) options.onFail();
      return;
    }

    var initialUrl = normalizeClientImageUrl(cleanedUrl);
    var loadToken = String(new Date().getTime()) + Math.random();

    img.dataset.loadToken = loadToken;
    img.dataset.previewRequested = 'false';
    img.style.display = '';

    img.onload = function () {
      if (img.dataset.loadToken !== loadToken) return;
      if (options.onLoad) options.onLoad();
    };

    img.onerror = function () {
      if (img.dataset.loadToken !== loadToken) return;
      if (img.dataset.previewRequested === 'true') {
        if (options.onFail) options.onFail();
        return;
      }

      img.dataset.previewRequested = 'true';
      requestServerImagePreview(cleanedUrl, function (previewUrl) {
        if (img.dataset.loadToken !== loadToken) return;
        if (!previewUrl) {
          if (options.onFail) options.onFail();
          return;
        }
        img.src = previewUrl;
      });
    };

    img.src = initialUrl;
  }

  function clearImageChoicePlaceholder(card) {
    var placeholder = card ? card.querySelector('.image-placeholder') : null;
    if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
  }

  function showImageChoicePlaceholder(card, label) {
    if (!card) return;
    clearImageChoicePlaceholder(card);
    var placeholder = document.createElement('div');
    placeholder.className = 'image-placeholder';
    placeholder.textContent = label || 'Preview unavailable';
    card.appendChild(placeholder);
  }

  function setImageChoiceEnabled(card, enabled) {
    if (!card) return;
    card.dataset.imageAvailable = enabled ? 'true' : 'false';
    card.classList.toggle('disabled', !enabled);
  }

  function updatePosterImageSelection() {
    for (var i = 0; i < 3; i++) {
      var card = document.getElementById('imageChoice' + i);
      if (card) card.classList.toggle('selected', i === state.selectedImageIndex);
    }
  }

  function clearPosterImageSelection(skipPersist) {
    state.selectedImageUrl = '';
    state.selectedImageIndex = -1;
    updatePosterImageSelection();
    if (!skipPersist) persistDraftState();
  }

  function getPreferredPosterImageIndex(urls) {
    if (state.selectedImageIndex >= 0 &&
        state.selectedImageIndex < urls.length &&
        urls[state.selectedImageIndex] === state.selectedImageUrl) {
      return state.selectedImageIndex;
    }
    if (!state.selectedImageUrl) return -1;
    for (var i = 0; i < urls.length; i++) {
      if (urls[i] === state.selectedImageUrl) return i;
    }
    return -1;
  }

  function maybeAutoSelectPosterImage(loadState, preferredIndex) {
    if (activePosterImageLoadState !== loadState) return;
    if (loadState.hasResolvedSelection) return;

    if (preferredIndex >= 0) {
      if (loadState.statuses[preferredIndex] === true) {
        loadState.hasResolvedSelection = true;
        selectPosterImage(preferredIndex);
        return;
      }
      if (loadState.statuses[preferredIndex] === null) return;
    }

    for (var i = 0; i < loadState.statuses.length; i++) {
      if (loadState.statuses[i] === true) {
        loadState.hasResolvedSelection = true;
        selectPosterImage(i);
        return;
      }
      if (loadState.statuses[i] === null) return;
    }

    loadState.hasResolvedSelection = true;
    clearPosterImageSelection();
  }

  function loadPosterImageChoices(species) {
    var urls = getSpeciesImageUrls(species);
    setText('imageSelectionCount', filledCount(urls) + ' / 3');
    var preferredIndex = getPreferredPosterImageIndex(urls);
    var loadState = {
      statuses: [null, null, null],
      hasResolvedSelection: false
    };
    activePosterImageLoadState = loadState;

    if (preferredIndex === -1) {
      clearPosterImageSelection(true);
    } else {
      state.selectedImageIndex = preferredIndex;
      state.selectedImageUrl = urls[preferredIndex] || '';
    }

    for (var i = 0; i < 3; i++) {
      var img = document.getElementById('posterImg' + i);
      var card = document.getElementById('imageChoice' + i);
      if (!img || !card) continue;
      card.classList.remove('selected');
      clearImageChoicePlaceholder(card);
      setImageChoiceEnabled(card, false);

      (function (imageEl, cardEl, imageUrl, index) {
        loadImageElement(imageEl, imageUrl, {
          onLoad: function () {
            loadState.statuses[index] = true;
            imageEl.style.display = '';
            clearImageChoicePlaceholder(cardEl);
            setImageChoiceEnabled(cardEl, true);
            maybeAutoSelectPosterImage(loadState, preferredIndex);
          },
          onFail: function () {
            loadState.statuses[index] = false;
            imageEl.removeAttribute('src');
            imageEl.style.display = 'none';
            setImageChoiceEnabled(cardEl, false);
            showImageChoicePlaceholder(cardEl, imageUrl ? 'Preview unavailable' : 'No image available');
            if (state.selectedImageIndex === index) {
              clearPosterImageSelection(true);
            }
            maybeAutoSelectPosterImage(loadState, preferredIndex);
          }
        });
      })(img, card, urls[i], i);
    }
  }

  function selectPosterImage(index) {
    var species = state.selectedSpecies;
    if (!species) return;
    var activeCard = document.getElementById('imageChoice' + index);
    if (activeCard && activeCard.dataset.imageAvailable !== 'true') return;
    if (activePosterImageLoadState) activePosterImageLoadState.hasResolvedSelection = true;
    var urls = getSpeciesImageUrls(species);
    state.selectedImageIndex = index;
    state.selectedImageUrl = urls[index] || '';
    updatePosterImageSelection();
    persistDraftState();
  }

  /* ===== Config loading ===== */

  function loadInitialConfig() {
    setBusy(true);
    google.script.run
      .withSuccessHandler(function (config) {
        state.config = config;
        document.getElementById('appTitle').textContent = config.appTitle || 'Endangered Species Rescue Mission';
        populateDropdowns(config.dropdowns);
        renderSpeciesGallery(config.species);
        setText('speciesReadyCount', (config.species ? config.species.length : 0) + ' species ready');
        setBusy(false);
        refreshDashboardChrome();
        restoreDraftState();
      })
      .withFailureHandler(handleError)
      .getInitialConfig();
  }

  function setBusy(isBusy, buttonId) {
    var overlay = document.getElementById('busyMessage');
    overlay.classList.toggle('hidden', !isBusy);
    if (buttonId) {
      var btn = document.getElementById(buttonId);
      if (btn) btn.disabled = isBusy;
    }
  }

  function populateDropdowns(dropdowns) {
    fillSelect('statusAnswer', dropdowns.conservationStatuses);
    fillSelect('habitatType', dropdowns.habitatTypes);
    fillSelect('dietType', dropdowns.dietTypes);
    fillSelect('threat1', dropdowns.threats);
    fillSelect('threat2', dropdowns.threats);
    fillSelect('action1', dropdowns.actions);
    fillSelect('action2', dropdowns.actions);
  }

  function fillSelect(id, values) {
    var select = document.getElementById(id);
    if (!select) return;
    select.innerHTML = '<option value="">Choose one</option>';
    for (var i = 0; i < values.length; i++) {
      var option = document.createElement('option');
      option.value = values[i];
      option.textContent = values[i];
      select.appendChild(option);
    }
  }

  /* ===== Species gallery ===== */

  function renderSpeciesGallery(speciesList) {
    var grid = document.getElementById('speciesGrid');
    grid.innerHTML = '';
    for (var i = 0; i < speciesList.length; i++) {
      (function (species) {
        var card = document.createElement('div');
        card.className = 'species-card';
        appendBestSpeciesImage(card, species);

        var body = document.createElement('div');
        body.className = 'species-card-body';

        var name = document.createElement('div');
        name.className = 'species-name';
        name.textContent = species.common_name;

        var scientific = document.createElement('div');
        scientific.className = 'species-scientific';
        scientific.textContent = species.scientific_name || '';

        var biome = document.createElement('div');
        biome.className = 'species-detail';
        biome.textContent = species.biome;

        var status = document.createElement('div');
        status.className = 'species-status';
        status.textContent = species.status || 'Conservation status unavailable';

        var btn = document.createElement('button');
        btn.className = 'btn btn-primary choose-species-btn';
        btn.type = 'button';
        btn.textContent = 'Open Mission';
        btn.addEventListener('click', function () { chooseSpecies(species.species_id); });

        body.appendChild(name);
        body.appendChild(scientific);
        body.appendChild(biome);
        body.appendChild(status);
        body.appendChild(btn);
        card.appendChild(body);
        grid.appendChild(card);
      })(speciesList[i]);
    }
  }

  function appendBestSpeciesImage(card, species) {
    var urls = getSpeciesImageUrls(species);
    tryImageAtIndex(card, species.common_name, urls, 0);
  }

  function tryImageAtIndex(card, commonName, urls, index) {
    if (index >= urls.length || !urls[index]) {
      replaceWithSpeciesPlaceholder(card, commonName);
      return;
    }
    clearSpeciesPlaceholder(card);
    var firstChild = card.firstChild;
    if (firstChild && firstChild.tagName === 'IMG') card.removeChild(firstChild);
    var img = document.createElement('img');
    img.alt = commonName;
    img.referrerPolicy = 'no-referrer';
    img.loading = 'eager';
    card.insertBefore(img, card.firstChild);
    loadImageElement(img, urls[index], {
      onLoad: function () {
        clearSpeciesPlaceholder(card);
      },
      onFail: function () {
        if (img.parentNode === card) card.removeChild(img);
        tryImageAtIndex(card, commonName, urls, index + 1);
      }
    });
  }

  function clearSpeciesPlaceholder(card) {
    var placeholder = card ? card.querySelector('.species-placeholder') : null;
    if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
  }

  function replaceWithSpeciesPlaceholder(card, commonName) {
    clearSpeciesPlaceholder(card);
    var firstChild = card.firstChild;
    if (firstChild && firstChild.tagName === 'IMG') card.removeChild(firstChild);
    var placeholder = document.createElement('div');
    placeholder.className = 'species-placeholder';
    placeholder.textContent = commonName + ' image';
    card.insertBefore(placeholder, card.firstChild);
  }

  /* ===== Mission flow handlers ===== */

  function handleStartMission() {
    clearStatus();
    var payload = {
      firstName: document.getElementById('firstName').value.trim(),
      lastName: document.getElementById('lastName').value.trim()
    };
    if (!payload.firstName || !payload.lastName) {
      showError('Please enter your first name and last name.');
      return;
    }
    setBusy(true, 'startMissionBtn');
    google.script.run
      .withSuccessHandler(function (result) {
        state.studentKey = result.studentKey;
        showEmergencyButton(true);
        showStage('species');
        persistDraftState();
        setBusy(false, 'startMissionBtn');
      })
      .withFailureHandler(function (error) { handleErrorWithButton(error, 'startMissionBtn'); })
      .startMission(payload);
  }

  function chooseSpecies(speciesId) {
    clearStatus();
    if (!state.studentKey) { showError('Please start the mission first.'); return; }
    toggleSpeciesButtons(true);
    setBusy(true);
    google.script.run
      .withSuccessHandler(function (result) {
        activePosterImageLoadState = null;
        clearPosterImageSelection(true);
        state.selectedSpecies = result.species;
        populateBriefing(result.species);
        updateReferencePanel(result.species);
        showStage('briefing');
        persistDraftState();
        toggleSpeciesButtons(false);
        setBusy(false);
      })
      .withFailureHandler(function (error) {
        toggleSpeciesButtons(false);
        handleError(error);
      })
      .saveSpeciesChoice(state.studentKey, speciesId);
  }

  function toggleSpeciesButtons(disabled) {
    var buttons = document.querySelectorAll('.choose-species-btn');
    for (var i = 0; i < buttons.length; i++) buttons[i].disabled = disabled;
  }

  function populateBriefing(species) {
    var commonNameEl = document.getElementById('briefingCommonName');
    if (commonNameEl) commonNameEl.textContent = species.common_name || '';
    document.getElementById('briefingBiome').textContent = species.biome || '';
    document.getElementById('briefingRegion').textContent = species.region || '';
    document.getElementById('briefingText').textContent =
      species.briefing_text || 'Use the research links to find out about this organism. Then fill in what you learn on the next screens.';
    populateLinkContainer(document.getElementById('briefingLinks'), species);
  }

  function updateReferencePanel(species) {
    var panel = document.getElementById('missionReference');
    if (!species) { panel.classList.add('hidden'); return; }
    document.getElementById('referenceSpeciesName').textContent = species.common_name || 'Mission Reference';
    setText('commandScientificName', species.scientific_name || '');
    setText('commandMetaBiome', species.biome || 'Awaiting species');
    setText('commandMetaStatus', species.status || 'Not yet selected');
    setText('commandMetaRegion', species.region || 'Awaiting species');
    setText('commandSummary', species.briefing_text || 'Use the mission resources to learn more about this species.');
    populateLinkContainer(document.getElementById('referenceLinks'), species);
    loadCommandSpeciesImage(species);
    panel.classList.remove('hidden');
  }

  function loadCommandSpeciesImage(species) {
    var img = document.getElementById('commandSpeciesImage');
    var fallback = document.getElementById('commandSpeciesFallback');
    if (!img || !fallback) return;

    var urls = getSpeciesImageUrls(species);
    var selectedUrl = '';
    for (var i = 0; i < urls.length; i++) {
      if (urls[i]) {
        selectedUrl = urls[i];
        break;
      }
    }

    if (!selectedUrl) {
      img.classList.add('hidden');
      img.removeAttribute('src');
      fallback.classList.remove('hidden');
      fallback.textContent = (species && species.common_name ? species.common_name : 'Species') + ' image';
      return;
    }

    fallback.textContent = (species.common_name || 'Species') + ' image';
    loadImageElement(img, selectedUrl, {
      onLoad: function () {
        img.classList.remove('hidden');
        fallback.classList.add('hidden');
      },
      onFail: function () {
        img.classList.add('hidden');
        img.removeAttribute('src');
        fallback.classList.remove('hidden');
      }
    });
  }

  function populateLinkContainer(container, species) {
    container.innerHTML = '';
    var researchLinks = [species.research_link_1, species.research_link_2];
    for (var i = 0; i < researchLinks.length; i++) {
      if (!researchLinks[i]) continue;
      var a = document.createElement('a');
      a.href = researchLinks[i];
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = 'Research Link ' + (i + 1);
      container.appendChild(a);
    }
    var googleUrl = 'https://www.google.com/search?q=' + encodeURIComponent((species.common_name || '') + ' endangered species conservation');
    var googleLink = document.createElement('a');
    googleLink.href = googleUrl;
    googleLink.target = '_blank';
    googleLink.rel = 'noopener noreferrer';
    googleLink.textContent = 'Search for more sources';
    container.appendChild(googleLink);
  }

  function handleSaveEcology() {
    clearStatus();
    var payload = {
      commonNameAnswer: document.getElementById('commonNameAnswer').value.trim(),
      scientificNameAnswer: document.getElementById('scientificNameAnswer').value.trim(),
      statusAnswer: document.getElementById('statusAnswer').value,
      habitatType: document.getElementById('habitatType').value,
      dietType: document.getElementById('dietType').value,
      adaptationType: document.getElementById('adaptationType').value.trim(),
      ecosystemRole: document.getElementById('ecosystemRole').value.trim(),
      ecologyExplanation: document.getElementById('ecologyExplanation').value.trim()
    };
    if (!payload.commonNameAnswer || !payload.scientificNameAnswer || !payload.statusAnswer ||
        !payload.habitatType || !payload.dietType || !payload.adaptationType ||
        !payload.ecosystemRole || !payload.ecologyExplanation) {
      showError('Please complete all fields before continuing.');
      return;
    }
    saveAnswersForStage('ecology');
    setBusy(true, 'saveEcologyBtn');
    google.script.run
      .withSuccessHandler(function () {
        showStage('threats');
        persistDraftState();
        setBusy(false, 'saveEcologyBtn');
      })
      .withFailureHandler(function (error) { handleErrorWithButton(error, 'saveEcologyBtn'); })
      .saveEcology(state.studentKey, payload);
  }

  function handleSaveThreats() {
    clearStatus();
    var payload = {
      threat1: document.getElementById('threat1').value,
      threat1Reason: document.getElementById('threat1Reason').value.trim(),
      threat2: document.getElementById('threat2').value,
      threat2Reason: document.getElementById('threat2Reason').value.trim()
    };
    if (!payload.threat1 || !payload.threat1Reason || !payload.threat2 || !payload.threat2Reason) {
      showError('Please choose 2 threats and explain each one.');
      return;
    }
    if (uniqueLowerCount([payload.threat1, payload.threat2]) !== 2) {
      showError('Please choose 2 different threats.');
      return;
    }
    saveAnswersForStage('threats');
    setBusy(true, 'saveThreatsBtn');
    google.script.run
      .withSuccessHandler(function () {
        showStage('actions');
        persistDraftState();
        setBusy(false, 'saveThreatsBtn');
      })
      .withFailureHandler(function (error) { handleErrorWithButton(error, 'saveThreatsBtn'); })
      .saveThreats(state.studentKey, payload);
  }

  function handleSaveActions() {
    clearStatus();
    var payload = {
      action1: document.getElementById('action1').value,
      action2: document.getElementById('action2').value,
      actionExplanation: document.getElementById('actionExplanation').value.trim()
    };
    if (!payload.action1 || !payload.action2 || !payload.actionExplanation) {
      showError('Please choose 2 actions and explain how they help.');
      return;
    }
    if (uniqueLowerCount([payload.action1, payload.action2]) !== 2) {
      showError('Please choose 2 different conservation actions.');
      return;
    }
    saveAnswersForStage('actions');
    setBusy(true, 'saveActionsBtn');
    google.script.run
      .withSuccessHandler(function () {
        showStage('final');
        persistDraftState();
        setBusy(false, 'saveActionsBtn');
      })
      .withFailureHandler(function (error) { handleErrorWithButton(error, 'saveActionsBtn'); })
      .saveActions(state.studentKey, payload);
  }

  function handleFinishMission() {
    clearStatus();
    var whyItMatters = document.getElementById('whyItMatters').value.trim();
    if (!whyItMatters) {
      showError('Please explain why this species matters.');
      return;
    }
    state.generatingPoster = true;
    showSuccess('<span class="spinner"></span>Please wait, making your MASTERPIECE!');
    document.getElementById('finishMissionBtn').disabled = true;

    google.script.run
      .withSuccessHandler(function (result) {
        state.generatingPoster = false;
        document.getElementById('finishMissionBtn').disabled = false;
        handleSubmissionResult(result, 'final');
      })
      .withFailureHandler(function (error) {
        state.generatingPoster = false;
        document.getElementById('finishMissionBtn').disabled = false;
        handleErrorWithButton(error, 'finishMissionBtn');
      })
      .finishMission(state.studentKey, {
        whyItMatters: whyItMatters,
        selectedImageUrl: state.selectedImageUrl || ''
      });
  }

  /* ===== Emergency submit ===== */

  function openSubmitModal(mode) {
    if (!state.studentKey || state.currentStage === 'submitted') return;
    state.submitMode = mode;
    document.getElementById('submitModalTitle').textContent =
      mode === 'emergency' ? 'Emergency Submit?' : 'Submit Mission?';
    document.getElementById('submitModalText').textContent =
      mode === 'emergency'
        ? 'Use this if class is ending. It will save your current work and submit a completion score based on what you have finished so far.'
        : 'This will submit your work now.';
    document.getElementById('submitModal').classList.remove('hidden');
  }

  function closeSubmitModal() {
    document.getElementById('submitModal').classList.add('hidden');
    state.submitMode = '';
  }

  function confirmModalSubmit() {
    if (state.submitMode === 'emergency') handleEmergencySubmit();
  }

  function handleEmergencySubmit() {
    closeSubmitModal();
    showSuccess('<span class="spinner"></span>Submitting your current work...');
    document.getElementById('emergencySubmitBtn').disabled = true;
    google.script.run
      .withSuccessHandler(function (result) {
        document.getElementById('emergencySubmitBtn').disabled = false;
        handleSubmissionResult(result, 'emergency');
      })
      .withFailureHandler(function (error) {
        document.getElementById('emergencySubmitBtn').disabled = false;
        handleError(error);
      })
      .emergencySubmitMission(state.studentKey);
  }

  /* ===== Submission result handling ===== */

  function handleSubmissionResult(result, mode) {
    state.currentStage = 'submitted';
    showEmergencyButton(false);

    var warning = result && result.warning ? result.warning : '';
    var message = mode === 'emergency'
      ? (warning || 'Emergency submit complete. Show your teacher.')
      : (warning || 'Mission complete. Your rescue poster has been submitted.');

    document.getElementById('submittedMessage').textContent = message;

    var hasPdf = !!(result && result.pdfUrl);
    var canShowLinks = !!(result && result.studentCanViewFiles);

    document.getElementById('submittedLinks').classList.toggle('hidden', !(canShowLinks && hasPdf));
    document.getElementById('completePdfLink').classList.toggle('hidden', !(canShowLinks && hasPdf));

    if (canShowLinks && hasPdf) document.getElementById('completePdfLink').href = result.pdfUrl;

    showStage('submitted');
    showSuccess(message);
    clearDraftState();
    refreshDashboardChrome();
  }

  /* ===== Stage navigation ===== */

  function showStage(stageName) {
    state.currentStage = stageName;
    for (var i = 0; i < stageOrder.length; i++) {
      document.getElementById('stage-' + stageOrder[i]).classList.toggle('hidden', stageOrder[i] !== stageName);
    }
    updateProgress(stageName);
    if (stageName === 'login' || stageName === 'species') {
      document.getElementById('missionReference').classList.add('hidden');
    } else if (state.selectedSpecies) {
      document.getElementById('missionReference').classList.remove('hidden');
    }
    if (stageName === 'final' && state.selectedSpecies) {
      loadPosterImageChoices(state.selectedSpecies);
    }
    updateCommandStageLabel();
    refreshDashboardChrome();
    persistDraftState();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updateProgress(stageName) {
    var index = stageOrder.indexOf(stageName);
    var percent = Math.max(0, (index / (stageOrder.length - 1)) * 100);
    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('progressText').textContent =
      stageChrome[stageName] ? stageChrome[stageName].progressTitle : 'Mission Progress';
    document.getElementById('progressStageText').textContent =
      stageChrome[stageName] ? stageChrome[stageName].progressCopy : 'Mission in progress';
    document.getElementById('progressPercent').textContent = Math.round(percent) + '%';
  }

  function showEmergencyButton(showIt) {
    document.getElementById('emergencySubmitBtn').classList.toggle('hidden', !showIt);
  }

  /* ===== Status messages ===== */

  function showError(message) {
    var box = document.getElementById('statusBox');
    box.className = 'status-banner status-error';
    box.innerHTML = message;
    box.classList.remove('hidden');
  }

  function showSuccess(message) {
    var box = document.getElementById('statusBox');
    box.className = 'status-banner status-success';
    box.innerHTML = message;
    box.classList.remove('hidden');
  }

  function clearStatus() {
    var box = document.getElementById('statusBox');
    box.classList.add('hidden');
    box.innerHTML = '';
  }

  function handleError(error) {
    var message = error && error.message ? error.message : String(error || 'Unknown error');
    setBusy(false);
    showError(message);
  }

  function handleErrorWithButton(error, buttonId) {
    var btn = document.getElementById(buttonId);
    if (btn) btn.disabled = false;
    handleError(error);
  }

  /* ===== Draft persistence ===== */

  function persistDraftState() {
    state.lastSavedAt = new Date().toISOString();
    var draft = {
      studentKey: state.studentKey,
      selectedSpeciesId: state.selectedSpecies ? state.selectedSpecies.species_id : '',
      selectedImageUrl: state.selectedImageUrl || '',
      selectedImageIndex: state.selectedImageIndex,
      savedAt: state.lastSavedAt,
      currentStage: state.currentStage || 'login',
      fields: collectFieldValues()
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(draft)); } catch (e) {}
    refreshDashboardChrome();
  }

  function restoreDraftState() {
    var raw;
    try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { raw = ''; }
    if (!raw) return;
    var draft;
    try { draft = JSON.parse(raw); } catch (e2) { return; }
    if (!draft || !draft.fields) return;

    applyFieldValues(draft.fields);
    state.studentKey = draft.studentKey || '';
    state.selectedImageUrl = draft.selectedImageUrl || '';
    state.selectedImageIndex = typeof draft.selectedImageIndex === 'number' ? draft.selectedImageIndex : -1;
    state.lastSavedAt = draft.savedAt || '';
    showEmergencyButton(!!state.studentKey);
    refreshDashboardChrome();

    if (!draft.selectedSpeciesId) {
      activePosterImageLoadState = null;
      clearPosterImageSelection(true);
      if (draft.currentStage === 'species' && state.studentKey) showStage('species');
      return;
    }

    var species = findSpeciesInConfig(draft.selectedSpeciesId);
    if (!species) return;

    state.selectedSpecies = species;
    populateBriefing(species);
    updateReferencePanel(species);

    if (draft.currentStage === 'submitted') { clearDraftState(); return; }
    if (stageOrder.indexOf(draft.currentStage) !== -1) showStage(draft.currentStage);
  }

  function collectFieldValues() {
    return {
      firstName: getValue('firstName'),
      lastName: getValue('lastName'),
      commonNameAnswer: getValue('commonNameAnswer'),
      scientificNameAnswer: getValue('scientificNameAnswer'),
      statusAnswer: getValue('statusAnswer'),
      habitatType: getValue('habitatType'),
      dietType: getValue('dietType'),
      adaptationType: getValue('adaptationType'),
      ecosystemRole: getValue('ecosystemRole'),
      ecologyExplanation: getValue('ecologyExplanation'),
      threat1: getValue('threat1'),
      threat1Reason: getValue('threat1Reason'),
      threat2: getValue('threat2'),
      threat2Reason: getValue('threat2Reason'),
      action1: getValue('action1'),
      action2: getValue('action2'),
      actionExplanation: getValue('actionExplanation'),
      whyItMatters: getValue('whyItMatters')
    };
  }

  function applyFieldValues(fields) {
    for (var key in fields) {
      if (fields.hasOwnProperty(key)) {
        var el = document.getElementById(key);
        if (el) el.value = fields[key] || '';
      }
    }
  }

  function getValue(id) {
    var el = document.getElementById(id);
    return el ? el.value : '';
  }

  function clearDraftState() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }

  /* ===== Utilities ===== */

  function uniqueLowerCount(values) {
    var seen = {};
    for (var i = 0; i < values.length; i++) seen[String(values[i]).toLowerCase()] = true;
    return Object.keys(seen).length;
  }

  function areFilled(values) {
    for (var i = 0; i < values.length; i++) {
      if (!String(values[i] || '').trim()) return false;
    }
    return true;
  }

  function filledCount(values) {
    var count = 0;
    for (var i = 0; i < values.length; i++) {
      if (String(values[i] || '').trim()) count++;
    }
    return count;
  }

  function findSpeciesInConfig(speciesId) {
    if (!state.config || !state.config.species) return null;
    var list = state.config.species;
    for (var i = 0; i < list.length; i++) {
      if (list[i].species_id === speciesId) return list[i];
    }
    return null;
  }
</script>
